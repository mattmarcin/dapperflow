name: CI

# Design and rationale (jobs, matrix, caching, flaky-test handling, verified
# action versions): docs/spec/cicd.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A new push to a branch cancels the in-flight run for that same ref, so PR queues
# stay short. `main` pushes are also grouped per-ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo. No job here writes to the repo, packages,
# or releases (that lives in release.yml).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  # ------------------------------------------------------------------ #
  # Fast feedback: formatting (advisory).                              #
  # ------------------------------------------------------------------ #
  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    # ADVISORY (continue-on-error) on purpose: the crate sources predate any
    # `cargo fmt` enforcement and are not yet normalized to rustfmt.toml, so
    # `cargo fmt --check` reports pre-existing drift that this CI lane must not
    # fix (it may not touch crates/). Once a one-time `cargo fmt` normalization
    # commit lands in the crates lane, drop `continue-on-error` to make it a hard
    # gate. See docs/spec/cicd.md, "Formatting gate".
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      # PINNED toolchain (not @stable): the fmt/clippy lint gates are pinned so a
      # new stable release cannot spontaneously fail CI with reformatting or new
      # lints against crate source this lane may not touch. 1.91 is the toolchain
      # this pipeline was verified green against. Bump deliberately, alongside a
      # crates-lane pass that clears any new findings. See docs/spec/cicd.md.
      - name: Install Rust (1.91 + rustfmt)
        uses: dtolnay/rust-toolchain@1.100
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  # ------------------------------------------------------------------ #
  # Fast feedback: clippy as a hard gate. Also serves as the Linux     #
  # build-sanity for the whole workspace (it compiles every target).   #
  # ------------------------------------------------------------------ #
  rust-clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # PINNED to 1.91 (see rust-fmt job): a floating stable clippy adds new lints
      # over time that would fail `-D warnings` on code this lane cannot edit
      # (e.g. 1.96 added clippy::unnecessary_sort_by, which fires on
      # crates/dflowd/src/api.rs). Pinning keeps the gate deterministic and green.
      - name: Install Rust (1.91 + clippy)
        uses: dtolnay/rust-toolchain@1.100
        with:
          components: clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: cargo clippy (-D warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # ------------------------------------------------------------------ #
  # Heavier: build the workspace on both OSes; run the test suite on    #
  # Windows (the validated platform). Gated behind clippy so lint       #
  # failures give fast feedback before the expensive matrix runs.       #
  # ------------------------------------------------------------------ #
  rust-build-test:
    name: build & test (${{ matrix.os }})
    needs: [rust-clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      # Build every target (incl. test binaries) on both OSes. This is the
      # cross-platform build-sanity for Linux, where the integration suite is
      # NOT executed because it drives Windows console shells (powershell/cmd).
      - name: Build (all targets)
        run: cargo build --workspace --all-targets --locked

      # Windows == the validated platform: run the real test suite.
      # Tier 1 - unit + bin tests in parallel (no PTY contention, fast).
      - name: Test - unit + bin (parallel)
        if: runner.os == 'Windows'
        run: cargo test --workspace --lib --bins --locked --no-fail-fast

      # Tier 2 - integration tests drive real PTYs/daemons. Serialize them
      # (--test-threads=1) so ConPTY spawn-timing contention under full parallel
      # load cannot flake them. Live/evidence tests are #[ignore]d and skipped.
      # DFLOW_DATA_DIR isolates daemon state to a throwaway dir.
      - name: Test - integration, serialized (PTY/daemon)
        if: runner.os == 'Windows'
        shell: bash
        env:
          DFLOW_DATA_DIR: ${{ runner.temp }}/dflow-ci
        run: cargo test --workspace --test '*' --locked --no-fail-fast -- --test-threads=1

      - name: Linux is build-sanity only
        if: runner.os != 'Windows'
        run: echo "Workspace built on ${{ runner.os }}; the PTY/daemon test suite runs on Windows (see docs/spec/cicd.md)."

  # ------------------------------------------------------------------ #
  # Frontend: typecheck + build both pnpm apps. Platform-agnostic, so   #
  # ubuntu only. One matrix leg per app.                                #
  # ------------------------------------------------------------------ #
  frontend:
    name: frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [desktop, mobile]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # apps/*/package.json carry no `packageManager` field, so the version
          # is pinned here. Lockfiles are v9.0 (pnpm 10 compatible).
          version: 10
      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
      # setup-node@v6 only auto-caches npm, so cache the pnpm store by hand.
      - name: Locate pnpm store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ matrix.app }}-${{ hashFiles(format('apps/{0}/pnpm-lock.yaml', matrix.app)) }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ matrix.app }}-
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Typecheck (tsc strict)
        run: pnpm exec tsc
      - name: Build (vite)
        run: pnpm exec vite build

  # ------------------------------------------------------------------ #
  # Desktop Tauri app compiles. This is where the Ubuntu webkit2gtk /   #
  # GTK system deps matter. `cargo check` keeps it lighter than a full  #
  # bundle (that lives in release.yml).                                 #
  # ------------------------------------------------------------------ #
  desktop-tauri:
    name: desktop app compiles (${{ matrix.os }})
    needs: [rust-clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # Tauri 2 Linux build prerequisites (webkit2gtk 4.1 line on ubuntu-24.04).
      # Required even for `cargo check`: the *-sys build scripts run pkg-config.
      - name: Install Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            wget \
            curl

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      # Tauri's build.rs expects the frontend bundle to exist (frontendDist:
      # ../dist), so build the desktop frontend before checking the Rust side.
      - name: Build desktop frontend (creates dist/)
        working-directory: apps/desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build (src-tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.os }}
      - name: cargo check (src-tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo check --locked
