# OpenCode adapter manifest (docs/spec/adapters.md).
#
# Server-first: the cleanest tier-2 is the server SSE bus `GET /event` -> session.idle
# (no screen scraping). Whether the current session model launches an addressable
# server, or needs `opencode serve` + attach, is a Phase 2 integration question
# (the design notes). Tags: [L] local, [D] docs, [S] seed.

[adapter]
name = "opencode"
command = "opencode"
# The brief is the value of --prompt, so --prompt stays immediately before {prompt}.
launch = ["{command}", "{autonomy_flags}", "{model_flag}", "{effort_flag}", "--prompt", "{prompt}"]
autonomy_flags = []                       # --auto auto-approves (dangerous) [L], not defaulted
model_flag = ["-m", "{model}"]            # [L] provider/model
effort_flag = ["--variant", "{effort}"]   # [L] provider-specific reasoning variant
env = {}
no_auto_steer = false
# opencode installs as an `opencode.cmd` shim launched through `cmd.exe /c` (finding #2),
# which truncates a multi-line argument at the first newline. The composed brief is
# multi-line, so it is TYPED after launch via the readiness-gated verified-submit path
# (finding #3) rather than passed as a `--prompt` launch argument. [L] proven live.
brief_delivery = "typed"

[signals]
busy_signature = "esc to interrupt"   # [S] interrupt hint, probed live in Phase 2
native = "sse"                         # [D] server SSE GET /event -> session.idle

[controls]
interrupt = "escape"    # [S] double-Esc flakiness is a seed hazard
exit_command = "/exit"  # [S]
resume = ["{command}", "-s", "{resume_ref}"]   # [L] -s <session>, -c most recent
skill_invocation = "/{skill}"                   # [S] exact form still to confirm live

[dialogs]
trust = { pattern = "trust", response = "enter" }   # [S] permission model, weak trust gate

[composer]
popup_prefixes = ["/"]
popup_settle_ms = 1200
ghost_text_styles = ["dim"]

[capabilities]
mcp = true          # [L] opencode mcp add
native_tier2 = "server SSE session.idle"

[context_injection]
# Standing dflow guidance for a New Session (adapters.md / Standing-guidance injection).
# [L] VERIFIED-LOCAL 2026-07-05: `opencode --help` and `opencode run --help` (opencode
# 1.17.13) expose no --system / --instructions flag - only --prompt. The `instructions`
# array lives in the GLOBAL ~/.config/opencode/config.json, which would apply to every
# opencode session, not this one - so it is not usable. Fall back to prepending the
# guidance to the first prompt (degraded; non-polluting).
method = "first_prompt"   # [L]
